name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual run from the Actions tab for debugging.
  workflow_dispatch:

# Cancel in-flight runs when a new commit lands on the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — pytest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: python -m pytest -ra

  frontend:
    name: Frontend — TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        # `npm ci` is the CI-correct flavour: fails if package-lock.json is
        # out of sync, doesn't mutate it, faster than `npm install`.
        run: npm ci

      - name: TypeScript check
        # --noEmit just type-checks without producing output. Catches the
        # kinds of silent regressions that next dev hides via
        # typescript.ignoreBuildErrors.
        run: npx tsc --noEmit
