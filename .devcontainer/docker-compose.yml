version: "3.9"

services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://gefo_user:gefo_password@db:5432/gefo_db
      NEXT_PUBLIC_API_URL: ""

  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: gefo_db
      POSTGRES_USER: gefo_user
      POSTGRES_PASSWORD: gefo_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gefo_user -d gefo_db"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
